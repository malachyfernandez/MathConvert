<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Reference MathJax v4 Config</title>
  <script id="MathJax-script" async
          src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js">
  </script>
</head>
<body>
<p>
$$x = {-b \pm \sqrt{b^2-4ac} \over 2a}$$
</p>

<script>
  console.log('=== REFERENCE MATHJAX V4 CONFIG ===');
  console.log('MathJax version:', window.MathJax.version);
  console.log('MathJax config:', window.MathJax.config);
  console.log('SRE config:', window.MathJax.config?.sre || 'No SRE config found');
  console.log('Available options:', Object.keys(window.MathJax.config || {}));
  
  setTimeout(() => {
    console.log('mjx-container aria-label:', document.querySelector('mjx-container')?.getAttribute('aria-label'));
    console.log('mjx-math data-semantic-speech:', document.querySelector('mjx-math')?.getAttribute('data-semantic-speech'));
    console.log('All speech attributes:', Array.from(document.querySelectorAll('[data-semantic-speech]')).map(el => ({
      tag: el.tagName,
      speech: el.getAttribute('data-semantic-speech')
    })));
  }, 2000);
</script>
</body>
</html>
